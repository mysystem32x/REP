<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login | DVT GROUP</title>
    <!-- Подключаем основной файл стилей -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ДЛЯ ФОРМЫ ВХОДА ===== */
        
        /* Контейнер формы */
        .login-container {
            max-width: 400px;
            width: 90%;
            margin: 40px auto;
            padding: 40px 30px;
            background: rgba(17, 12, 9, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color, rgba(255, 255, 255, 0.1));
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(212, 165, 116, 0.2);
            transition: all 0.3s ease;
        }

        /* Заголовок формы */
        .login-title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            color: var(--accent-color, #d4a574);
            font-family: var(--font-title, 'Cormorant Garamond', serif);
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(212, 165, 116, 0.3);
            word-break: break-word;
        }

        /* Форма */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        /* Группа полей */
        .form-group {
            width: 100%;
            position: relative;
        }

        /* Поля ввода */
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color, rgba(255, 255, 255, 0.1));
            border-radius: 12px;
            color: var(--text-color, #ffffff);
            font-size: 16px;
            font-family: var(--font-main, 'IBM Plex Sans', sans-serif);
            transition: all 0.3s ease;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }

        /* Стили для автозаполнения браузера */
        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover,
        .form-group input:-webkit-autofill:focus {
            -webkit-text-fill-color: #ffffff;
            -webkit-box-shadow: 0 0 0px 1000px rgba(212, 165, 116, 0.1) inset;
            transition: background-color 5000s ease-in-out 0s;
            border-color: var(--accent-color, #d4a574);
        }

        /* Фокус на полях */
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color, #d4a574);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(212, 165, 116, 0.3);
        }

        /* Placeholder */
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
            font-size: 15px;
        }

        /* Кнопка входа */
        .login-button {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--accent-color, #d4a574) 0%, var(--accent-hover, #e8b896) 100%);
            color: var(--bg-color, #110c09);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-main, 'IBM Plex Sans', sans-serif);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 10px;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            position: relative;
            overflow: hidden;
        }

        /* Эффект пульсации при нажатии */
        .login-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(100, 100);
                opacity: 0;
            }
        }

        .login-button:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        /* Ховер эффект (только для устройств с поддержкой hover) */
        @media (hover: hover) {
            .login-button:hover {
                background: linear-gradient(135deg, var(--accent-hover, #e8b896) 0%, var(--accent-color, #d4a574) 100%);
                transform: translateY(-3px);
                box-shadow: 0 10px 30px rgba(212, 165, 116, 0.5);
            }
        }

        /* Активное состояние для тач-устройств */
        .login-button:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.4);
        }

        /* Информационный блок */
        .login-info {
            text-align: center;
            margin-top: 30px;
            color: var(--text-color, #ffffff);
            font-size: 15px;
            opacity: 0.8;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px dashed var(--border-color, rgba(255, 255, 255, 0.15));
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            word-break: break-word;
        }

        .login-info span {
            color: var(--accent-color, #d4a574);
            font-weight: 700;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
        }

        /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */

        /* Планшеты и большие телефоны (до 768px) */
        @media screen and (max-width: 768px) {
            .login-container {
                width: 85%;
                max-width: 450px;
                margin: 30px auto;
                padding: 30px 25px;
            }

            .login-title {
                margin-bottom: 25px;
                font-size: 28px;
            }

            .form-group input {
                padding: 15px 18px;
                font-size: 15px;
            }

            .login-button {
                padding: 15px 18px;
                font-size: 16px;
                margin-top: 5px;
            }

            .login-info {
                margin-top: 25px;
                padding: 12px 15px;
                font-size: 14px;
            }

            .login-info span {
                font-size: 15px;
            }
        }

        /* Телефоны (до 480px) */
        @media screen and (max-width: 480px) {
            main {
                min-height: calc(100vh - 80px - 150px);
                padding: 20px 0;
            }

            .login-container {
                width: 92%;
                margin: 20px auto;
                padding: 25px 18px;
                border-radius: 16px;
                background: rgba(17, 12, 9, 0.9);
            }

            .login-title {
                font-size: 24px;
                margin-bottom: 20px;
                letter-spacing: 1px;
            }

            .form-group input {
                padding: 14px 16px;
                font-size: 14px;
                border-radius: 10px;
            }

            .form-group input::placeholder {
                font-size: 13px;
            }

            .login-button {
                padding: 14px 16px;
                font-size: 15px;
                letter-spacing: 1px;
                border-radius: 10px;
            }

            .login-info {
                margin-top: 20px;
                padding: 12px;
                font-size: 13px;
                line-height: 1.6;
                border-radius: 10px;
            }

            .login-info span {
                font-size: 14px;
            }
        }

        /* Маленькие телефоны (до 360px) */
        @media screen and (max-width: 360px) {
            main {
                min-height: calc(100vh - 70px - 120px);
            }

            .login-container {
                width: 95%;
                margin: 15px auto;
                padding: 20px 12px;
                border-radius: 14px;
            }

            .login-title {
                font-size: 22px;
                margin-bottom: 18px;
            }

            .form-group {
                margin-bottom: 12px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 13px;
                border-radius: 8px;
            }

            .login-button {
                padding: 12px 14px;
                font-size: 14px;
                border-radius: 8px;
                margin-top: 5px;
            }

            .login-info {
                margin-top: 18px;
                padding: 10px;
                font-size: 12px;
            }

            .login-info span {
                font-size: 13px;
            }
        }

        /* Очень маленькие экраны (до 280px) */
        @media screen and (max-width: 280px) {
            .login-container {
                padding: 15px 10px;
            }

            .login-title {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .form-group input {
                padding: 10px 12px;
                font-size: 12px;
            }

            .login-button {
                padding: 10px 12px;
                font-size: 13px;
            }

            .login-info {
                font-size: 11px;
                padding: 8px;
            }
        }

        /* ===== ОБЩИЕ СТИЛИ ===== */

        /* Центрирование main контента */
        main {
            min-height: calc(100vh - 133px - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Убираем лишние отступы у footer */
        footer {
            margin-top: 0;
        }

        /* Адаптация header для мобильных */
        @media screen and (max-width: 768px) {
            .main-header {
                position: relative;
                background: rgba(17, 12, 9, 0.95);
            }

            .logo-box {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }

            .main-title {
                font-size: 20px;
            }

            .sub-title {
                font-size: 9px;
            }
        }

        @media screen and (max-width: 480px) {
            .logo-box {
                width: 45px;
                height: 45px;
                font-size: 15px;
            }

            .logo-text {
                gap: 2px;
            }

            .main-title {
                font-size: 18px;
                letter-spacing: 1px;
            }

            .sub-title {
                font-size: 8px;
            }
        }

        @media screen and (max-width: 360px) {
            .logo-box {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }

            .main-title {
                font-size: 16px;
            }

            .sub-title {
                font-size: 7px;
            }
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary, #0f0c09);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-color, #d4a574);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover, #e8b896);
        }

        /* Для Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color, #d4a574) var(--bg-secondary, #0f0c09);
        }

        /* Убираем лишние отступы у body */
        body {
            background-color: var(--bg-color, #110c09);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Контейнер для header и main */
        body > * {
            flex-shrink: 0;
        }

        /* Footer прибиваем к низу */
        footer {
            margin-top: auto;
        }

        /* Защита от растягивания на больших экранах */
        @media screen and (min-width: 1440px) {
            .login-container {
                margin: 60px auto;
            }
        }

        /* Ландшафтная ориентация на мобильных */
        @media screen and (max-height: 600px) and (orientation: landscape) {
            main {
                min-height: auto;
                padding: 15px;
            }

            .login-container {
                margin: 15px auto;
                padding: 20px;
            }

            .login-title {
                margin-bottom: 15px;
                font-size: 22px;
            }

            .form-group input {
                padding: 12px 15px;
            }

            .login-button {
                padding: 12px 15px;
            }

            .login-info {
                margin-top: 15px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <div class="logo-section">
            <a href="/" style="text-decoration: none; display: flex; align-items: center;">
                <img src="/static/images/logo.png" alt="Respect Home" class="main-logo">
            </a>
        </div>
        </div>
    </header>

    <main>
        <div class="login-container">
            <h1 class="login-title">Вход в админ панель</h1>
            <form method="POST" class="login-form" autocomplete="off">
                <div class="form-group">
                    <input type="text" 
                           name="username" 
                           placeholder="Логин" 
                           required 
                           autocomplete="username"
                           id="username">
                </div>
                <div class="form-group">
                    <input type="password" 
                           name="password" 
                           placeholder="Пароль" 
                           required 
                           autocomplete="current-password"
                           id="password">
                </div>
                <button type="submit" class="login-button">Вход</button>
            </form>
            <div class="login-info">
                Стандартный логин: <span>admin</span><br>
                Пароль: <span>admin123</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-bottom">
                <p class="copyright">Copyright © 2025 Respect Home</p>
            </div>
        </div>
    </footer>
</body>
</html>
